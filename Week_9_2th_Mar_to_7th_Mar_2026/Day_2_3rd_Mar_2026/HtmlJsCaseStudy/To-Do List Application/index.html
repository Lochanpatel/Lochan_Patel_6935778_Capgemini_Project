<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-card">
        <h2>My Tasks</h2>
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="What needs to be done?">
            <button id="add-btn">Add</button>
        </div>
        <ul id="task-list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
